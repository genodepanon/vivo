<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RED ALBUM · folders</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #1a0406;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
    color: #f0eef0;
    min-height: 100vh;
}

.app {
    max-width: 550px;
    margin: 0 auto;
    padding: 20px 16px 40px;
}

.header {
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 24px;
    background: linear-gradient(135deg, #ff9499, #e11d24, #ff5a60);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    letter-spacing: -0.3px;
}

.section {
    margin-bottom: 30px;
}

.section-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
    font-weight: 600;
    color: #ffc2c5;
    border-left: 3px solid #e63946;
    padding-left: 10px;
}

.see-all {
    color: #ff8a8f;
    font-size: 13px;
    background: rgba(230, 57, 70, 0.2);
    padding: 4px 10px;
    border-radius: 30px;
    cursor: default;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
}

.album {
    background: #0f0203e6;
    border: 1px solid #ac2c33;
    border-radius: 20px;
    padding: 10px;
    transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    cursor: pointer;
    backdrop-filter: blur(2px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.album:hover {
    border-color: #ff6f76;
    transform: translateY(-3px);
    background: #180406;
    box-shadow: 0 8px 18px rgba(225, 29, 36, 0.2);
}

.album:active {
    transform: scale(0.98);
}

.album img {
    width: 100%;
    height: 140px;
    border-radius: 16px;
    object-fit: cover;
    background: linear-gradient(135deg, #d42a33, #8f131f);
}

.album-name {
    font-size: 15px;
    margin-top: 10px;
    font-weight: 700;
    color: #ffcfd1;
    display: flex;
    align-items: center;
    gap: 6px;
}

.album-count {
    font-size: 12px;
    color: #e0a0a3;
    margin-top: 4px;
}

.album-latest {
    font-size: 10px;
    color: #bd7b7e;
    margin-top: 5px;
}

/* MODAL */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.94);
    backdrop-filter: blur(12px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    visibility: hidden;
    opacity: 0;
    transition: visibility 0.2s, opacity 0.25s ease;
}

.modal-overlay.active {
    visibility: visible;
    opacity: 1;
}

.modal-container {
    width: 85%;
    max-width: 380px;
    background: #0f0103;
    border-radius: 48px;
    border: 1px solid #e63946;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(230, 57, 70, 0.25);
    overflow: hidden;
    transform: scale(0.95);
    transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.5, 1.2);
}

.modal-overlay.active .modal-container {
    transform: scale(1);
}

.modal-folder-header {
    background: linear-gradient(135deg, #2b090c, #1f0305);
    padding: 20px 22px 14px 22px;
    border-bottom: 1px solid #b12c33;
    display: flex;
    align-items: center;
    gap: 12px;
}

.folder-icon-large {
    font-size: 42px;
    filter: drop-shadow(0 4px 6px #00000044);
}

.folder-name-modal {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.3px;
    color: #ffb7bb;
}

.loading-zone {
    padding: 64px 32px 80px 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0102;
    min-height: 280px;
}

.circle-spinner {
    width: 72px;
    height: 72px;
    position: relative;
}

.circle-spinner .spinner-ring {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 3px solid transparent;
    border-top-color: #e63946;
    border-right-color: #ff8a8f;
    border-bottom-color: #e63946;
    animation: spinCircle 0.85s linear infinite;
    box-shadow: 0 0 12px rgba(230, 57, 70, 0.4);
}

.circle-spinner .spinner-inner {
    position: absolute;
    top: 18px;
    left: 18px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: #ffb7bb;
    border-left-color: #ff6a6f;
    animation: spinCircleReverse 0.6s linear infinite;
}

@keyframes spinCircle {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes spinCircleReverse {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(-360deg); }
}

.spinner-glow {
    position: absolute;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(230,57,70,0.15) 0%, rgba(230,57,70,0) 70%);
    animation: glowPulse 1.4s infinite ease-out;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
}

@keyframes glowPulse {
    0% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.8);}
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.4);}
}

.modal-footer {
    padding: 18px 22px 24px;
    border-top: 1px solid #2f0f12;
    display: flex;
    justify-content: center;
}

.close-loading-btn {
    background: #2b0d10;
    border: 1px solid #c34248;
    color: #ffc2c5;
    padding: 8px 32px;
    border-radius: 60px;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
}

.close-loading-btn:hover {
    background: #e63946;
    color: white;
    border-color: white;
}

body.modal-open {
    overflow: hidden;
}

@media (max-width: 450px) {
    .grid { gap: 12px; }
    .album img { height: 120px; }
    .loading-zone { padding: 56px 32px 72px 32px; }
    .circle-spinner { width: 64px; height: 64px; }
    .circle-spinner .spinner-inner { top: 16px; left: 16px; width: 32px; height: 32px; }
}
</style>
</head>
<body>

<div class="app">
    <div class="header">🔴 RED ALBUM</div>
    <div class="section">
        <div class="section-header">
            <span>📁 FOLDERS</span>
            <span class="see-all">tap to open</span>
        </div>
        <div class="grid" id="albumsGrid"></div>
    </div>
</div>

<div id="folderModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-folder-header">
            <div class="folder-icon-large" id="modalFolderIcon">📁</div>
            <div class="folder-name-modal" id="modalFolderName">Folder</div>
        </div>
        <div class="loading-zone" id="loadingZone">
            <div style="position: relative; display: flex; justify-content: center; align-items: center;">
                <div class="spinner-glow"></div>
                <div class="circle-spinner">
                    <div class="spinner-ring"></div>
                    <div class="spinner-inner"></div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="close-loading-btn" id="closeModalBtn">CLOSE</button>
        </div>
    </div>
</div>

<script>
const folders = [
    { name: "Camera", icon: "📷", img: "camera[1].jpg", minCount: 38, maxCount: 58 },
    { name: "Screenshot", icon: "📘", img: "screenshot.png", minCount: 22, maxCount: 47 },
    { name: "Messenger", icon: "💬", img: "messenger.png", minCount: 30, maxCount: 55 },
    { name: "Video", icon: "🎬", img: "video.png", minCount: 15, maxCount: 44 },
    { name: "Download", icon: "📥", img: "download.png", minCount: 28, maxCount: 52 },
    { name: "Alight Motion", icon: "✨", img: "alightmotion.jpg", minCount: 38, maxCount: 52 },
    { name: "Open AI", icon: "🤖", img: "openai.png", minCount: 19, maxCount: 48 }
];

function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function getTimeAgo() {
    const type = randomInt(1, 100);
    if (type <= 15) {
        return "just now";
    } else if (type <= 30) {
        return "1 minute ago";
    } else {
        const minutes = randomInt(2, 59);
        return `${minutes} minutes ago`;
    }
}

const grid = document.getElementById("albumsGrid");

function buildGrid() {
    grid.innerHTML = '';
    folders.forEach((folder, idx) => {
        const itemCount = randomInt(folder.minCount, folder.maxCount);
        const timeAgo = getTimeAgo();
        
        const div = document.createElement("div");
        div.className = "album";
        div.setAttribute("data-folder-name", folder.name);
        div.setAttribute("data-folder-icon", folder.icon);
        
        div.innerHTML = `
            <img src="${folder.img}" alt="${folder.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="album-name">${folder.icon} ${folder.name}</div>
            <div class="album-count">📸 ${itemCount} items</div>
            <div class="album-latest">🕒 Updated ${timeAgo}</div>
        `;
        
        div.addEventListener("click", (e) => {
            e.stopPropagation();
            const folderName = div.getAttribute("data-folder-name");
            const folderIcon = div.getAttribute("data-folder-icon");
            openLoadingFolderModal(folderName, folderIcon);
        });
        
        grid.appendChild(div);
    });
}

const modalOverlay = document.getElementById("folderModal");
const modalFolderNameSpan = document.getElementById("modalFolderName");
const modalFolderIconSpan = document.getElementById("modalFolderIcon");
const closeBtn = document.getElementById("closeModalBtn");

function closeModal() {
    modalOverlay.classList.remove("active");
    document.body.classList.remove("modal-open");
}

function openLoadingFolderModal(folderName, folderIcon) {
    modalFolderNameSpan.innerText = folderIcon + " " + folderName;
    modalFolderIconSpan.innerText = folderIcon;
    
    const spinnerRing = document.querySelector(".circle-spinner .spinner-ring");
    const spinnerInner = document.querySelector(".circle-spinner .spinner-inner");
    const glowEffect = document.querySelector(".spinner-glow");
    
    if (spinnerRing) {
        spinnerRing.style.animation = 'none';
        spinnerRing.offsetHeight;
        spinnerRing.style.animation = 'spinCircle 0.85s linear infinite';
    }
    
    if (spinnerInner) {
        spinnerInner.style.animation = 'none';
        spinnerInner.offsetHeight;
        spinnerInner.style.animation = 'spinCircleReverse 0.6s linear infinite';
    }
    
    if (glowEffect) {
        glowEffect.style.animation = 'none';
        glowEffect.offsetHeight;
        glowEffect.style.animation = 'glowPulse 1.4s infinite ease-out';
    }
    
    modalOverlay.classList.add("active");
    document.body.classList.add("modal-open");
}

closeBtn.addEventListener("click", closeModal);

modalOverlay.addEventListener("click", (e) => {
    if (e.target === modalOverlay) {
        closeModal();
    }
});

document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && modalOverlay.classList.contains("active")) {
        closeModal();
    }
});

buildGrid();
</script>
</body>
</html>
