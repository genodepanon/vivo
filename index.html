<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVO V12020 · AUTH</title>
</head>
<body>

<input type="text" id="authKey" placeholder="Enter 40-key">
<button onclick="checkKey()">SUBMIT</button>

<script>
(function(){

    const i = document.getElementById('authKey');

    // 🔐 Hidden-style key (split so it's less obvious)
    const _k = (
        "v9x2a7b4c1d8e5f0" +
        "g6h3i9j2k7l4m1n8" +
        "p5q0r6s3"
    );

    function clean(v){
        return v.replace(/\s+/g,'').replace(/-/g,'');
    }

    window.checkKey = function(){

        const v = clean(i.value);

        if(v.length !== 40){
            alert("INVALID KEY LENGTH");
            return;
        }

        if(v !== _k){
            alert("ACCESS DENIED");
            return;
        }

        alert("ACCESS GRANTED");
        window.location.href = "nextweb.html";
    }

})();
</script>

</body>
</html>
