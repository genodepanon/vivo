<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VIVO V12020 · AUTHENTICATION</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a0406;
            font-family: system-ui, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .auth-panel {
            background: #0f0203;
            border: 1px solid #e03a3e;
            border-radius: 2rem;
            width: 100%;
            max-width: 560px;
            padding: 2.2rem;
            box-shadow: 0 20px 35px -12px rgba(220, 30, 40, 0.25);
        }

        .device-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #e03a3e;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .device-model {
            font-size: 1.6rem;
            font-weight: 700;
            color: #ff5a5f;
        }

        .active-badge {
            background: #0a5e1a;
            color: #fff;
            font-size: 0.75rem;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            border: 1px solid #34d95b;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: #f3a6aa;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .key-input {
            width: 100%;
            background: #1f070a;
            border: 1px solid #ac2c33;
            border-radius: 1rem;
            padding: 1rem;
            font-family: monospace;
            color: #ffc9cc;
            outline: none;
        }

        .key-input:focus {
            border-color: #ff4d54;
        }

        .submit-btn {
            width: 100%;
            margin-top: 1.2rem;
            background: #d92b33;
            border: none;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 700;
            color: white;
            border-radius: 2rem;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #ff2a35;
        }

        /* MESSAGE BOX (replaces alerts) */
        .message {
            margin-top: 1rem;
            padding: 0.9rem;
            border-radius: 0.8rem;
            font-size: 0.9rem;
            display: none;
        }

        .error {
            background: #2e0c0f;
            border: 1px solid #ff3b3f;
            color: #ffb3b6;
        }

        .success {
            background: #0c2e14;
            border: 1px solid #34d95b;
            color: #b8ffd0;
        }
    </style>
</head>

<body>

<div class="auth-panel">
    <div class="device-header">
        <span class="device-model">VIVO V12020</span>
        <span class="active-badge">ACTIVE</span>
    </div>

    <label>AUTHENTICATION KEY</label>
    <input type="text" id="authKey" class="key-input" placeholder="Enter 40-character key">

    <button class="submit-btn" id="submitBtn">SUBMIT</button>

    <!-- message box replaces alerts -->
    <div id="msgBox" class="message"></div>
</div>

<script>
    // 🔐 Fake AUTH KEY (frontend demo only)
    const AUTH_KEY = "VIVO-1234-5678-ABCD-EFGH-IJKL-MNOP-QRST-UVWX";

    const input = document.getElementById("authKey");
    const btn = document.getElementById("submitBtn");
    const msgBox = document.getElementById("msgBox");

    function showMessage(text, type) {
        msgBox.style.display = "block";
        msgBox.className = "message " + type;
        msgBox.textContent = text;
    }

    function normalize(key) {
        return key.replace(/\s+/g, "").replace(/-/g, "");
    }

    function validate() {
        const value = input.value;

        if (!value) {
            showMessage("Authentication required.", "error");
            return;
        }

        const cleanedInput = normalize(value);
        const cleanedAuth = normalize(AUTH_KEY);

        if (cleanedInput === cleanedAuth) {
            showMessage("Access granted. Redirecting...", "success");

            setTimeout(() => {
                window.location.href = "nextweb.html";
            }, 1200);

        } else {
            showMessage("Invalid authentication key.", "error");
        }
    }

    btn.addEventListener("click", validate);

    input.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            validate();
        }
    });
</script>

</body>
</html>
